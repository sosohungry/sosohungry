<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="0.5" y="0.5" width="399" height="219" rx="16" ry="16" fill="#161b22" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>

  <!-- Top glow -->
  <rect x="40" y="0" width="320" height="2" rx="1" fill="#3fb950" opacity="0.4" filter="url(#glow)"/>

  <!-- Circuit pattern decoration -->
  <g opacity="0.1" stroke="#3fb950" stroke-width="0.5" fill="none">
    <line x1="310" y1="20" x2="370" y2="20"/>
    <line x1="370" y1="20" x2="370" y2="55"/>
    <line x1="330" y1="35" x2="380" y2="35"/>
    <line x1="350" y1="15" x2="350" y2="50"/>
    <line x1="320" y1="50" x2="365" y2="50"/>
    <circle cx="370" cy="20" r="2.5" fill="#3fb950"/>
    <circle cx="350" cy="35" r="2" fill="#3fb950"/>
    <circle cx="330" cy="35" r="2" fill="#3fb950"/>
    <circle cx="370" cy="55" r="2" fill="#3fb950"/>
    <circle cx="350" cy="50" r="2.5" fill="#3fb950"/>
  </g>

  <!-- Icon -->
  <text x="28" y="44" font-size="26">📱</text>

  <!-- Title -->
  <text x="24" y="82" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="white">sosohungry.github.io</text>

  <!-- Description -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#8b949e">
    <tspan x="24" y="110">Personal blog and portfolio</tspan>
    <tspan x="24" dy="18">Showcasing Android projects</tspan>
  </text>

  <!-- Divider -->
  <line x1="24" y1="165" x2="376" y2="165" stroke="#21262d" stroke-width="1"/>

  <!-- Bottom bar -->
  <circle cx="24" cy="190" r="4" fill="#3fb950"/>
  <text x="34" y="194" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">HTML/CSS</text>
  <text x="376" y="194" font-family="'Courier New',monospace" font-size="12" fill="#e3b341" text-anchor="end">★ 0</text>
</svg>