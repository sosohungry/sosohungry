<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="850" height="200">
  <defs>
    <style>
      @keyframes floatUp {
        0% { transform: translateY(0); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.8; }
        100% { transform: translateY(-60px); opacity: 0; }
      }
      .particle { animation: floatUp infinite linear; }

      @keyframes reveal {
        from { width: 0; }
        to { width: 600px; }
      }
      #reveal-rect { animation: reveal 3s steps(62) forwards; }

      @keyframes moveCursor {
        from { transform: translateX(0); }
        to { transform: translateX(600px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      #cursor {
        animation: moveCursor 3s steps(62) forwards, blink 0.8s infinite;
      }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="typewriterClip">
      <rect id="reveal-rect" x="155" y="110" width="0" height="30"/>
    </clipPath>
  </defs>

  <rect width="850" height="200" fill="url(#bgGrad)"/>

  <!-- Particles -->
  <circle class="particle" cx="80"  cy="180" r="1.5" fill="white"   style="animation-duration:5s;animation-delay:0s"/>
  <circle class="particle" cx="150" cy="160" r="1"   fill="#3fb950" style="animation-duration:7s;animation-delay:1s"/>
  <circle class="particle" cx="230" cy="170" r="2"   fill="white"   style="animation-duration:6s;animation-delay:0.5s"/>
  <circle class="particle" cx="310" cy="190" r="1"   fill="#3fb950" style="animation-duration:8s;animation-delay:2s"/>
  <circle class="particle" cx="390" cy="175" r="1.5" fill="white"   style="animation-duration:5.5s;animation-delay:1.5s"/>
  <circle class="particle" cx="460" cy="185" r="1"   fill="#3fb950" style="animation-duration:7.5s;animation-delay:0.8s"/>
  <circle class="particle" cx="530" cy="165" r="2"   fill="white"   style="animation-duration:6.5s;animation-delay:2.5s"/>
  <circle class="particle" cx="600" cy="180" r="1.5" fill="#3fb950" style="animation-duration:5s;animation-delay:1.2s"/>
  <circle class="particle" cx="670" cy="190" r="1"   fill="white"   style="animation-duration:8s;animation-delay:0.3s"/>
  <circle class="particle" cx="740" cy="170" r="1.5" fill="#3fb950" style="animation-duration:6s;animation-delay:1.8s"/>
  <circle class="particle" cx="110" cy="150" r="1"   fill="white"   style="animation-duration:7s;animation-delay:3s"/>
  <circle class="particle" cx="200" cy="185" r="2"   fill="#3fb950" style="animation-duration:5.5s;animation-delay:0.2s"/>
  <circle class="particle" cx="350" cy="155" r="1"   fill="white"   style="animation-duration:6.5s;animation-delay:2.2s"/>
  <circle class="particle" cx="500" cy="195" r="1.5" fill="#3fb950" style="animation-duration:7.5s;animation-delay:1.6s"/>
  <circle class="particle" cx="620" cy="160" r="1"   fill="white"   style="animation-duration:5s;animation-delay:2.8s"/>
  <circle class="particle" cx="770" cy="185" r="2"   fill="#3fb950" style="animation-duration:6s;animation-delay:0.6s"/>
  <circle class="particle" cx="50"  cy="195" r="1"   fill="white"   style="animation-duration:8s;animation-delay:1.4s"/>
  <circle class="particle" cx="420" cy="150" r="1.5" fill="#3fb950" style="animation-duration:7s;animation-delay:3.2s"/>
  <circle class="particle" cx="280" cy="195" r="1"   fill="white"   style="animation-duration:5.5s;animation-delay:0.9s"/>
  <circle class="particle" cx="700" cy="155" r="1.5" fill="#3fb950" style="animation-duration:6.5s;animation-delay:2.1s"/>
  <circle class="particle" cx="820" cy="175" r="1"   fill="white"   style="animation-duration:7s;animation-delay:0.4s"/>
  <circle class="particle" cx="170" cy="145" r="1.5" fill="white"   style="animation-duration:6s;animation-delay:3.5s"/>
  <circle class="particle" cx="560" cy="190" r="1"   fill="#3fb950" style="animation-duration:5s;animation-delay:1.1s"/>
  <circle class="particle" cx="40"  cy="165" r="2"   fill="white"   style="animation-duration:7.5s;animation-delay:2.6s"/>

  <!-- Title -->
  <text x="425" y="75" font-family="'Courier New',monospace" font-size="36" font-weight="bold" fill="white" text-anchor="middle">sosohungry</text>

  <!-- Glow line -->
  <rect x="225" y="92" width="400" height="1.5" rx="1" fill="url(#glowGrad)"/>

  <!-- Subtitle typewriter -->
  <g clip-path="url(#typewriterClip)">
    <text x="155" y="130" font-family="'Courier New',monospace" font-size="16" fill="#8b949e" text-anchor="start">Android Developer · Agent Engineer · IoT Enthusiast</text>
  </g>

  <!-- Cursor -->
  <text id="cursor" x="155" y="130" font-family="'Courier New',monospace" font-size="16" fill="#3fb950" font-weight="bold">▌</text>
</svg>
