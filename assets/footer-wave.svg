<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 40" width="850" height="40">
  <defs>
    <style>
      @keyframes slideRight {
        from { transform: translateX(0); }
        to { transform: translateX(-850px); }
      }
      @keyframes slideLeft {
        from { transform: translateX(-850px); }
        to { transform: translateX(0); }
      }
      .wave1 { animation: slideRight 8s infinite linear; }
      .wave2 { animation: slideLeft 6s infinite linear; }
    </style>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ff6e40"/>
    </linearGradient>
  </defs>

  <!-- Wave 1 (back) -->
  <g class="wave1" opacity="0.3">
    <path d="M0,25 C70,15 140,35 210,25 C280,15 350,35 425,25 C495,15 565,35 637,25 C707,15 780,35 850,25 C920,15 990,35 1060,25 C1130,15 1200,35 1275,25 C1345,15 1415,35 1487,25 C1557,15 1630,35 1700,25 L1700,40 L0,40 Z" fill="url(#waveGrad)"/>
  </g>

  <!-- Wave 2 (front) -->
  <g class="wave2" opacity="0.6">
    <path d="M0,28 C80,18 160,38 240,28 C320,18 400,38 480,28 C560,18 640,38 720,28 C800,18 850,30 850,28 C930,18 1010,38 1090,28 C1170,18 1250,38 1330,28 C1410,18 1490,38 1570,28 C1650,18 1700,30 1700,28 L1700,40 L0,40 Z" fill="url(#waveGrad)"/>
  </g>
</svg>
